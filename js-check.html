<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JS Error Check</title></head>
<body>
<h2>Checking JS files...</h2>
<div id="results"></div>
<script>
var results = document.getElementById('results');
function log(msg, ok) {
  var d = document.createElement('div');
  d.style.color = ok ? 'green' : 'red';
  d.textContent = (ok ? '✅ ' : '❌ ') + msg;
  results.appendChild(d);
}
window.onerror = function(msg, file, line, col, err) {
  log(msg + ' (' + file + ':' + line + ':' + col + ')', false);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  log('Promise: ' + e.reason, false);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.0/dist/vue.global.prod.js"></script>
<script>log('Vue loaded', typeof Vue !== 'undefined');</script>
<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.7/dist/dexie.min.js"></script>
<script>log('Dexie loaded', typeof Dexie !== 'undefined');</script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>log('jsPDF loaded', typeof jspdf !== 'undefined');</script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
<script>log('Tesseract loaded', typeof Tesseract !== 'undefined');</script>
<script src="js/nice-classes.js?v=11"></script>
<script>log('nice-classes loaded', typeof WORD_CATS !== 'undefined' || typeof window.NICE_CLASSES !== 'undefined');</script>
<script src="js/pdf-generator.js?v=11"></script>
<script>log('pdf-generator loaded', true);</script>
<script src="js/ai-extract.js?v=11"></script>
<script>log('ai-extract loaded', typeof AiExtract !== 'undefined');</script>
<script>log('AiExtract.ocrBusinessLicense exists', typeof AiExtract !== 'undefined' && typeof AiExtract.ocrBusinessLicense === 'function');</script>
<script>log('AiExtract.llmExtract exists', typeof AiExtract !== 'undefined' && typeof AiExtract.llmExtract === 'function');</script>
<script src="js/ai-image.js?v=11"></script>
<script>log('ai-image loaded', typeof AITrademarkImage !== 'undefined' || typeof window.AITrademarkImage !== 'undefined');</script>
<script src="js/high-tech.js?v=11"></script>
<script>log('high-tech loaded', typeof HighTech !== 'undefined' || typeof window.HighTech !== 'undefined');</script>
<script src="js/ht-ledger.js?v=11"></script>
<script>log('ht-ledger loaded', typeof HTLedger !== 'undefined' || typeof window.HTLedger !== 'undefined');</script>
<script src="js/app.js?v=11"></script>
<script>
log('app.js loaded (no errors)', true);
// Try to mount Vue app
try {
  var app = app || null;
  log('Vue app created', !!app);
} catch(e) {
  log('Vue app error: ' + e.message, false);
}
</script>
</body>
</html>
